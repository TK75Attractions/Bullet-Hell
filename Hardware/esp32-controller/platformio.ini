; PlatformIO 設定 — sparkle IoT XH-S3E (ESP32-S3, N16R8)
; 使い方: VSCode でこのフォルダ (Hardware/esp32-controller) を開く → PIO が自動認識
;   書き込み: PlatformIO: Upload（またはターミナルで `pio run -t upload`）
;   モニタ  : PlatformIO: Serial Monitor（`pio device monitor`・115200bps）
; ※ .ino はこのフォルダ直下のまま（src_dir = . で直接ビルド）

[platformio]
src_dir = .

[env:xh_s3e]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Keep the serial monitor from toggling ESP32-S3 reset/boot strap lines.
monitor_dtr = 0
monitor_rts = 0
board_build.flash_size = 16MB
; native USB 側の USB-C ポートから CDC シリアルを出す
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; --- ESP32-DevKitC-VE (ESP32-WROVER-E) = classic ESP32 ---
; 書き込み: pio run -e wrover -t upload   モニタ: pio device monitor -e wrover
; USBブリッジ(CP2102/CH340)経由の単一UART。ピンは .ino の #else 側(WROVER用)が自動選択される。
[env:wrover]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; ESP32 も DTR/RTS でリセットするのでモニタ時は無効化
monitor_dtr = 0
monitor_rts = 0
